<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>Leaderboard — BO2 League</title>
  <link rel="stylesheet" href="css/style.css"/>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow+Condensed:wght@400;600;700&family=Barlow:wght@400;500;600&display=swap" rel="stylesheet"/>
  <style>
    .lb-top td { background: rgba(232,100,10,0.06); }
    .lb-top td:first-child { border-left: 3px solid var(--orange); }
    .td-orange { color: var(--orange); font-family: var(--font-h); font-weight: 600; }
    .text-green { color: var(--green); font-family: var(--font-h); font-weight:600; }
    .text-red   { color: var(--red);   font-family: var(--font-h); font-weight:600; }
  </style>
</head>
<body>
  <header id="top-nav"><div class="top-nav-inner"><a href="index.html" class="nav-logo"><span class="logo-hex">⬡</span><span class="logo-text">BO2<span class="logo-accent">LEAGUE</span></span></a><div class="nav-right"><span class="admin-indicator" id="admin-badge" style="display:none">⚡ Admin</span><button class="nav-auth-btn" id="login-btn" onclick="openModal('login-modal')">Sign In</button><button class="nav-auth-btn ghost" id="logout-btn" style="display:none">Sign Out</button><button class="hamburger-btn" id="hamburger-btn" aria-label="Menu"><span></span><span></span><span></span></button></div></div></header>
  <nav id="sub-nav"><div class="sub-nav-inner"><a href="index.html" class="sub-nav-link"><span class="snl-icon">🏠</span> Home</a><a href="matches.html" class="sub-nav-link"><span class="snl-icon">🎮</span> Matches</a><a href="leaderboard.html" class="sub-nav-link"><span class="snl-icon">🏆</span> Leaderboard</a><a href="schedule.html" class="sub-nav-link"><span class="snl-icon">📅</span> Schedule</a><a href="teams.html" class="sub-nav-link"><span class="snl-icon">🛡</span> Teams</a><a href="players.html" class="sub-nav-link"><span class="snl-icon">👤</span> Players</a><a href="rules.html" class="sub-nav-link"><span class="snl-icon">📋</span> Rulebook</a><a href="announcements.html" class="sub-nav-link"><span class="snl-icon">📢</span> News</a><div class="sub-nav-divider"></div><a href="admin.html" class="sub-nav-link admin-only" style="display:none"><span class="snl-icon">⚙️</span> Admin</a></div></nav>
  <nav id="mobile-drawer"><div class="drawer-section-label">Main</div><a href="index.html" class="drawer-link"><span class="dl-icon">🏠</span> Home</a><a href="matches.html" class="drawer-link"><span class="dl-icon">🎮</span> Matches</a><a href="leaderboard.html" class="drawer-link"><span class="dl-icon">🏆</span> Leaderboard</a><a href="schedule.html" class="drawer-link"><span class="dl-icon">📅</span> Schedule</a><div class="drawer-divider"></div><div class="drawer-section-label">League</div><a href="teams.html" class="drawer-link"><span class="dl-icon">🛡</span> Teams</a><a href="players.html" class="drawer-link"><span class="dl-icon">👤</span> Players</a><a href="rules.html" class="drawer-link"><span class="dl-icon">📋</span> Rulebook</a><a href="announcements.html" class="drawer-link"><span class="dl-icon">📢</span> News</a><div class="drawer-divider"></div><a href="admin.html" class="drawer-link admin-only" style="display:none"><span class="dl-icon">⚙️</span> Admin Panel</a></nav>

  <div class="page-wrap">
    <div class="container">
      <div class="mb-24">
        <div class="section-label">Season 1 — Week 6</div>
        <h1 class="section-title">LEADERBOARD</h1>
        <p style="color:var(--grey-pale)">Updated after each match day.</p>
      </div>

      <!-- View toggle -->
      <div class="ms-tabs" style="margin-bottom:16px">
        <button class="ms-tab active" data-filter="players">Players</button>
        <button class="ms-tab" data-filter="teams">Teams</button>
      </div>

      <!-- Tier filter -->
      <div class="tier-filter mb-24">
        <button class="tier-btn active" data-tier="all">All Tiers</button>
        <button class="tier-btn" data-tier="Prestige">Prestige</button>
        <button class="tier-btn" data-tier="Elite">Elite</button>
        <button class="tier-btn" data-tier="Challenger">Challenger</button>
        <button class="tier-btn" data-tier="Contender">Contender</button>
        <button class="tier-btn" data-tier="Prospect">Prospect</button>
        <button class="tier-btn" data-tier="Recruit">Recruit</button>
      </div>

      <div class="card" style="overflow-x:auto">
        <table class="data-table">
          <thead id="lb-head"></thead>
          <tbody id="lb-body"><tr><td colspan="7"><div class="spinner"></div></td></tr></tbody>
        </table>
      </div>
    </div>
  </div>

  <div class="modal-overlay" id="login-modal"><div class="modal"><div class="modal-header"><h2 class="modal-title">ADMIN LOGIN</h2><button class="modal-close">✕</button></div><form id="login-form"><div class="form-group"><label class="form-label">Email</label><input type="email" id="login-email" name="email" required/></div><div class="form-group"><label class="form-label">Password</label><input type="password" id="login-password" name="password" required/></div><button type="submit" class="btn btn-primary btn-full" style="margin-top:8px">Sign In</button></form></div></div>
  <div id="toast-container"></div>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="js/supabase-config.js"></script>
  <script src="js/main.js"></script>
  <script src="js/leaderboard.js"></script>
</body>
</html>
