<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Sector 7 | Login</title>
  <link rel="stylesheet" href="assets/style.css">
  <script defer src="https://unpkg.com/@supabase/supabase-js@2"></script>
  <script defer src="assets/app.js"></script>
</head>

<body>

  <!-- HEADER -->
  <header class="s7-header">
    <div class="s7-header-inner">

      <!-- LOGO -->
      <a href="index.html" class="s7-logo-link">
        <img src="assets/logos/sector7-logo.png" class="s7-logo-img" alt="Sector 7 Logo">
      </a>

      <!-- NAV -->
      <nav class="s7-nav">
        <a href="index.html">Home</a>
        <a href="teams.html">Teams</a>
        <a href="players.html">Players</a>
        <a href="matches.html">Matches</a>
        <a href="rankings.html">Rankings</a>
        <a href="sniper.html">Sniper</a>
        <a href="seasonal.html">Seasonal</a>
        <a href="ladders.html">Ladders</a>
        <a href="disputes.html">Disputes</a>
        <a href="support.html">Support</a>
      </nav>

      <!-- AUTH -->
      <div class="s7-auth-block">
        <button id="login-btn" class="s7-btn s7-btn-accent" style="display:none;">Login</button>
        <button id="logout-btn" class="s7-btn s7-btn-ghost" style="display:none;">Logout</button>
      </div>

    </div>
  </header>

  <!-- MAIN -->
  <main class="s7-main" style="display:flex; justify-content:center;">

    <div class="s7-card" style="max-width:420px; width:100%; margin-top:40px;">
      <h2 style="margin-top:0; text-transform:uppercase; letter-spacing:0.12em;">Login</h2>

      <label>Email</label>
      <input id="login-email" class="s7-input" placeholder="Enter email">

      <label>Password</label>
      <input id="login-password" type="password" class="s7-input" placeholder="Enter password">

      <button id="login-submit" class="s7-btn s7-btn-accent" style="margin-top:15px; width:100%;">
        Login
      </button>

      <p style="margin-top:15px; text-align:center;">
        Don't have an account?
        <a href="register.html" class="s7-link">Create one</a>
      </p>
    </div>

  </main>

  <!-- NOTIFICATION -->
  <div id="notification"></div>

</body>
</html>
